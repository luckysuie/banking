# Test profile — H2 in-memory, HTTP Basic, no Azure services

spring:
  datasource:
    url: jdbc:h2:mem:banking-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: false

  flyway:
    enabled: false

server:
  port: 0

app:
  data:
    initialize: false
  security:
    customer:
      username: customer
      password: test-customer-password
    admin:
      username: admin
      password: test-admin-password

logging:
  level:
    root: WARN
    com.cloudbank.digitalbanking: INFO
