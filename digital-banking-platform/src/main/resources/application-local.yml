# Local development — H2 in-memory database and HTTP Basic auth

spring:
  datasource:
    url: jdbc:h2:mem:digitalbanking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

app:
  security:
    customer:
      username: ${APP_SECURITY_CUSTOMER_USERNAME:customer}
      password: ${APP_SECURITY_CUSTOMER_PASSWORD:changeme-customer}
    admin:
      username: ${APP_SECURITY_ADMIN_USERNAME:admin}
      password: ${APP_SECURITY_ADMIN_PASSWORD:changeme-admin}
  data:
    initialize: ${APP_DATA_INITIALIZE:true}

logging:
  level:
    com.cloudbank.digitalbanking: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
