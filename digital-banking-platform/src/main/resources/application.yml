# Base configuration — activate a profile: local (default) or azure

spring:
  application:
    name: digital-banking-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  data:
    initialize: ${APP_DATA_INITIALIZE:true}

logging:
  level:
    root: INFO
    com.cloudbank.digitalbanking: INFO
