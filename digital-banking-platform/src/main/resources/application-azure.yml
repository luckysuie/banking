# Microsoft Azure production profile — SQL Database + Key Vault + HTTP Basic auth
# JDBC URL + SQL credentials are loaded from Key Vault via managed identity:
#   sql-jdbc-url       → sql.jdbc.url
#   sql-admin-username → sql.admin.username
#   sql-admin-password → sql.admin.pas

spring:
  config:
    import: optional:azure-keyvault://

  cloud:
    azure:
      credential:
        managed-identity-enabled: true
      keyvault:
        secret:
          property-source-enabled: true
          property-sources:
            - name: cloudbank-keyvault
              endpoint: https://banking-kv-1234.vault.azure.net/
              secret-keys:
                - sql-jdbc-url
                - sql-admin-username
                - sql-admin-password
              credential:
                managed-identity-enabled: true

  datasource:
    url: ${sql.jdbc.url}
    username: ${sql.admin.username}
    password: ${sql.admin.password}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: false

app:
  security:
    customer:
      username: ${APP_SECURITY_CUSTOMER_USERNAME:customer}
      password: ${APP_SECURITY_CUSTOMER_PASSWORD:changeme-customer}
    admin:
      username: ${APP_SECURITY_ADMIN_USERNAME:admin}
      password: ${APP_SECURITY_ADMIN_PASSWORD:changeme-admin}
  data:
    initialize: ${APP_DATA_INITIALIZE:false}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

logging:
  level:
    com.cloudbank.digitalbanking: INFO
    com.azure: WARN
