# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions


name: Build and deploy JAR app to Azure Web App - banking-webapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: digital-banking-web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd digital-banking-web
          npm install

      - name: Build React frontend
        run: |
          cd digital-banking-web
          npm run build

      - name: Copy frontend build into Spring Boot static resources
        run: |
          rm -rf digital-banking-platform/src/main/resources/static
          mkdir -p digital-banking-platform/src/main/resources/static
          cp -r digital-banking-web/dist/. digital-banking-platform/src/main/resources/static/

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Run backend tests
        run: |
          cd digital-banking-platform
          mvn -B test

      - name: Package Spring Boot JAR (with bundled frontend)
        run: |
          cd digital-banking-platform
          mvn -B clean package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: digital-banking-platform/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3726CF66C42B42028D2B1C857F0AEC20 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C22763673EFD48618F494EFD657EED5C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FCA3F309E7974FD4B11B63CAF1AE7631 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bankingwebapp'
          slot-name: 'Production'
          package: '*.jar'
          
