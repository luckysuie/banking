trigger:
  branches:
    include:
      - main

pool:
  name: Banking-Agent-Pool
  demands:
    - Agent.Name -equals agent

variables:
  frontendPath: digital-banking-web
  backendPath: digital-banking-platform
  azureServiceConnection: banking-service-connec
  webAppName: bankingwebapp

steps:

- checkout: self
  clean: true

- script: |
    java --version
    mvn --version
    node --version
    npm --version
    git --version
    az --version
  displayName: Verify Required Tools

- script: |
    npm ci
    npm run build
  workingDirectory: '$(System.DefaultWorkingDirectory)/$(frontendPath)'
  displayName: Build React Frontend

- script: |
    rm -rf "$(System.DefaultWorkingDirectory)/$(backendPath)/src/main/resources/static"
    mkdir -p "$(System.DefaultWorkingDirectory)/$(backendPath)/src/main/resources/static"

    cp -r "$(System.DefaultWorkingDirectory)/$(frontendPath)/dist/." \
    "$(System.DefaultWorkingDirectory)/$(backendPath)/src/main/resources/static/"
  displayName: Copy Frontend into Spring Boot

- script: |
    mvn clean package
  workingDirectory: '$(System.DefaultWorkingDirectory)/$(backendPath)'
  displayName: Build Spring Boot Application

- script: |
    ls -lh "$(System.DefaultWorkingDirectory)/$(backendPath)/target/"
  displayName: Verify Generated JAR

- task: AzureWebApp@1
  displayName: Deploy to Azure App Service
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webAppLinux'
    appName: '$(webAppName)'
    package: '$(System.DefaultWorkingDirectory)/$(backendPath)/target/*.jar'
    runtimeStack: 'JAVA|21-java21'