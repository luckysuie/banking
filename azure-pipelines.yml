trigger:
  branches:
    include:
      - main

pool:
  name: Banking-Agent-Pool
  demands:
    - Agent.Name -equals agent

variables:
  frontendPath: 'digital-banking-web'
  backendPath: 'digital-banking-platform'
  azureServiceConnection: 'banking-service-connec'
  webAppName: 'bankingwebapp'

steps:

# 1. Checkout repository
- checkout: self
  clean: true
  displayName: Checkout source code

# 2. Install/use Node.js
- task: NodeTool@0
  displayName: Use Node.js 20
  inputs:
    versionSpec: '20.x'

# 3. Build React frontend
- script: |
    set -e

    echo "Node version:"
    node --version

    echo "NPM version:"
    npm --version

    npm ci
    npm run build

    echo "===== React build files ====="
    find dist -maxdepth 3 -type f -print

    if [ ! -f dist/index.html ]; then
      echo "ERROR: dist/index.html was not generated"
      exit 1
    fi
  workingDirectory: '$(System.DefaultWorkingDirectory)/$(frontendPath)'
  displayName: Build React frontend

# 4. Copy React build into Spring Boot static resources
- script: |
    set -e

    DIST_DIR="$(System.DefaultWorkingDirectory)/$(frontendPath)/dist"
    STATIC_DIR="$(System.DefaultWorkingDirectory)/$(backendPath)/src/main/resources/static"

    echo "Removing old static resources..."
    rm -rf "$STATIC_DIR"

    echo "Creating static resources folder..."
    mkdir -p "$STATIC_DIR"

    echo "Copying React build..."
    cp -r "$DIST_DIR/." "$STATIC_DIR/"

    echo "===== Spring Boot static files ====="
    find "$STATIC_DIR" -maxdepth 3 -type f -print

    if [ ! -f "$STATIC_DIR/index.html" ]; then
      echo "ERROR: index.html was not copied into Spring Boot"
      exit 1
    fi
  displayName: Copy frontend into Spring Boot

# 5. Build Spring Boot using Java already installed on the agent
- script: |
    set -e

    JAVA_PATH="$(readlink -f "$(command -v java)")"
    export JAVA_HOME="$(dirname "$(dirname "$JAVA_PATH")")"
    export PATH="$JAVA_HOME/bin:$PATH"

    echo "JAVA_HOME=$JAVA_HOME"

    echo "===== Java version ====="
    java -version

    echo "===== Maven version ====="
    mvn -version

    echo "===== Building Spring Boot application ====="
    mvn -B clean package -DskipTests
  workingDirectory: '$(System.DefaultWorkingDirectory)/$(backendPath)'
  displayName: Build Spring Boot JAR

# 6. Verify frontend exists inside the JAR
- script: |
    set -e

    BACKEND_DIR="$(System.DefaultWorkingDirectory)/$(backendPath)"
    STAGING_DIR="$(Build.ArtifactStagingDirectory)"

    cd "$BACKEND_DIR"

    JAR_FILE=$(find target -maxdepth 1 \
      -type f \
      -name "*.jar" \
      ! -name "*.jar.original" \
      ! -name "*-sources.jar" \
      ! -name "*-javadoc.jar" \
      -print -quit)

    if [ -z "$JAR_FILE" ]; then
      echo "ERROR: Deployable JAR was not found"
      exit 1
    fi

    echo "Selected JAR: $JAR_FILE"

    echo "===== Checking index.html inside JAR ====="
    unzip -l "$JAR_FILE" | grep "BOOT-INF/classes/static/index.html"

    echo "===== Checking frontend assets inside JAR ====="
    unzip -l "$JAR_FILE" | grep "BOOT-INF/classes/static/assets/" | head -20

    mkdir -p "$STAGING_DIR"
    cp "$JAR_FILE" "$STAGING_DIR/banking-app.jar"

    echo "===== Deployment package ====="
    ls -lh "$STAGING_DIR/banking-app.jar"
  displayName: Verify and prepare deployment JAR

# 7. Deploy JAR to Azure App Service
- task: AzureWebApp@1
  displayName: Deploy to Azure App Service
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webAppLinux'
    appName: '$(webAppName)'
    package: '$(Build.ArtifactStagingDirectory)/banking-app.jar'
    deploymentMethod: 'auto'