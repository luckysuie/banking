trigger:
  branches:
    include:
      - main

pool:
  name: Banking-Agent-Pool
  demands:
    - Agent.Name -equals agent

variables:
  frontendPath: 'digital-banking-web'
  backendPath: 'digital-banking-platform'
  azureServiceConnection: 'banking-service-connec'
  webAppName: 'bankingwebapp'

steps:
- checkout: self
  clean: true

- task: NodeTool@0
  displayName: Install Node.js 20
  inputs:
    versionSpec: '20.x'

- script: |
    set -e
    npm ci
    npm run build

    echo "===== Frontend build output ====="
    find dist -maxdepth 3 -type f -print

    test -f dist/index.html
  workingDirectory: '$(System.DefaultWorkingDirectory)/$(frontendPath)'
  displayName: Build React frontend

- script: |
    set -e

    STATIC_DIR="$(System.DefaultWorkingDirectory)/$(backendPath)/src/main/resources/static"
    DIST_DIR="$(System.DefaultWorkingDirectory)/$(frontendPath)/dist"

    rm -rf "$STATIC_DIR"
    mkdir -p "$STATIC_DIR"
    cp -rv "$DIST_DIR/." "$STATIC_DIR/"

    echo "===== Files copied into Spring Boot ====="
    find "$STATIC_DIR" -maxdepth 3 -type f -print

    test -f "$STATIC_DIR/index.html"
  displayName: Copy React build into Spring Boot

- task: Maven@4
  displayName: Build Spring Boot JAR
  inputs:
    mavenPomFile: '$(backendPath)/pom.xml'
    goals: 'clean package'
    options: '-DskipTests'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.21'
    publishJUnitResults: false

- script: |
    set -e

    cd "$(System.DefaultWorkingDirectory)/$(backendPath)"

    JAR_FILE=$(find target -maxdepth 1 \
      -type f \
      -name "*.jar" \
      ! -name "*.jar.original" \
      | head -n 1)

    if [ -z "$JAR_FILE" ]; then
      echo "No deployable JAR found"
      exit 1
    fi

    echo "JAR selected: $JAR_FILE"

    echo "===== Verify frontend inside JAR ====="
    unzip -l "$JAR_FILE" | grep "BOOT-INF/classes/static/index.html"
    unzip -l "$JAR_FILE" | grep "BOOT-INF/classes/static/assets/"

    mkdir -p "$(Build.ArtifactStagingDirectory)"
    cp "$JAR_FILE" "$(Build.ArtifactStagingDirectory)/banking-app.jar"
  displayName: Verify and stage JAR

- task: AzureWebApp@1
  displayName: Deploy to Azure App Service
  inputs:
    azureSubscription: '$(azureServiceConnection)'
    appType: 'webAppLinux'
    appName: '$(webAppName)'
    package: '$(Build.ArtifactStagingDirectory)/banking-app.jar'
    deploymentMethod: 'auto'